<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Révisions Brevet — Histoire-Géographie-EMC</title>
  <style>
    :root{
      --bg:#fff8f0;
      --panel:#ffffff;
      --ink:#273043;
      --muted:#6b7280;
      --primary:#9b8cf2;
      --primary-strong:#7063d5;
      --secondary:#8ed6d1;
      --accent:#ffb7c5;
      --yellow:#ffe8a3;
      --green:#bdeecf;
      --blue:#b9dcff;
      --orange:#ffd0a6;
      --red:#ffb4b4;
      --shadow:0 18px 40px rgba(64,48,100,.12);
      --radius:24px;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family: ui-rounded, "SF Pro Rounded", "Nunito", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color:var(--ink);
      background:
        radial-gradient(circle at 8% 10%, #e6dcff 0, transparent 28%),
        radial-gradient(circle at 90% 8%, #d8fff5 0, transparent 25%),
        radial-gradient(circle at 50% 100%, #ffdce5 0, transparent 28%),
        var(--bg);
      min-height:100vh;
    }
    button,select{font:inherit}
    .app{max-width:1180px;margin:0 auto;padding:22px;}
    header{
      display:flex;align-items:center;justify-content:space-between;gap:16px;
      margin-bottom:18px;
    }
    .brand{display:flex;align-items:center;gap:14px;}
    .logo{
      width:58px;height:58px;border-radius:20px;
      background:linear-gradient(145deg,var(--primary),var(--secondary));
      display:grid;place-items:center;color:white;font-size:27px;font-weight:900;
      box-shadow:var(--shadow);
    }
    h1{font-size:clamp(1.5rem,4vw,2.4rem);margin:0;line-height:1.05;}
    .subtitle{margin:6px 0 0;color:var(--muted);font-weight:650;}
    .top-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end;}
    .btn{
      border:0;cursor:pointer;border-radius:999px;padding:12px 16px;font-weight:850;
      color:var(--ink);background:var(--panel);box-shadow:0 10px 28px rgba(38,40,60,.10);
      transition:.18s ease;display:inline-flex;align-items:center;gap:8px;text-decoration:none;
    }
    .btn:hover{transform:translateY(-2px);box-shadow:0 16px 34px rgba(38,40,60,.14)}
    .btn.primary{background:linear-gradient(135deg,var(--primary),#c9bfff);color:white;}
    .btn.danger{background:#fff0f0;color:#a84040;}
    .btn.small{padding:9px 12px;font-size:.92rem;}
    .layout{display:grid;grid-template-columns:300px 1fr;gap:18px;align-items:start;}
    .sidebar,.screen,.card{
      background:rgba(255,255,255,.82);
      backdrop-filter:blur(12px);
      border:1px solid rgba(255,255,255,.88);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }
    .sidebar{padding:16px;position:sticky;top:16px;}
    .progress-box{background:linear-gradient(145deg,#fff,#f7f5ff);border-radius:22px;padding:14px;margin-bottom:14px;}
    .progress-line{height:13px;border-radius:999px;background:#eee8ff;overflow:hidden;margin:12px 0 7px;}
    .progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--secondary));width:0%;transition:.3s ease;}
    .stat-row{display:flex;justify-content:space-between;gap:10px;color:var(--muted);font-weight:750;font-size:.93rem;}
    .nav-title{font-size:.85rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:900;margin:10px 8px;}
    .nav{display:grid;gap:8px;}
    .nav button{
      width:100%;border:0;background:#fff;border-radius:18px;padding:12px 14px;text-align:left;
      display:flex;align-items:center;justify-content:space-between;gap:10px;cursor:pointer;color:var(--ink);font-weight:850;
      box-shadow:0 7px 20px rgba(40,38,70,.07);transition:.15s ease;
    }
    .nav button:hover,.nav button.active{background:#f3efff;transform:translateX(2px)}
    .badge{background:#f2f0ff;border-radius:999px;padding:4px 8px;font-size:.78rem;color:var(--primary-strong);font-weight:900;}
    .screen{padding:20px;min-height:620px;}
    .hero{
      border-radius:28px;padding:24px;margin-bottom:18px;
      background:linear-gradient(135deg,#f1ecff,#e6fff9 48%,#fff0f4);
      display:grid;grid-template-columns:1.2fr .8fr;gap:14px;align-items:center;
    }
    .hero h2{font-size:clamp(1.6rem,4vw,3rem);line-height:1.02;margin:0 0 10px;}
    .hero p{font-size:1.05rem;color:#4b5563;font-weight:650;line-height:1.5;margin:0 0 16px;}
    .hero-card{background:white;border-radius:24px;padding:16px;box-shadow:0 12px 34px rgba(52,42,90,.10);}
    .quick-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px;}
    .quick-stat{background:#faf8ff;border-radius:18px;padding:12px;text-align:center;}
    .quick-stat strong{display:block;font-size:1.35rem;}
    .quick-stat span{font-size:.82rem;color:var(--muted);font-weight:800;}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;}
    .chapter-card,.method-card,.timeline-card{
      background:white;border-radius:24px;padding:16px;border:1px solid #f1eefb;box-shadow:0 12px 30px rgba(47,43,75,.08);
      cursor:pointer;transition:.18s ease;min-height:150px;display:flex;flex-direction:column;justify-content:space-between;
    }
    .chapter-card:hover,.method-card:hover,.timeline-card:hover{transform:translateY(-4px);box-shadow:0 18px 42px rgba(47,43,75,.13)}
    .chapter-top{display:flex;gap:11px;align-items:flex-start;}
    .icon{width:46px;height:46px;border-radius:16px;display:grid;place-items:center;font-size:23px;flex:0 0 auto;}
    .theme-history{background:#ffe3db}.theme-geo{background:#def7ec}.theme-emc{background:#e9e3ff}.theme-method{background:#fff0bd}
    .chapter-card h3,.card h3{margin:0 0 7px;font-size:1.06rem;line-height:1.2;}
    .chapter-card p{margin:0;color:var(--muted);line-height:1.35;font-weight:620;font-size:.94rem;}
    .chips{display:flex;gap:7px;flex-wrap:wrap;margin-top:12px;}
    .chip{border-radius:999px;background:#f7f5ff;color:#6458c7;padding:6px 10px;font-size:.78rem;font-weight:900;}
    .screen-title{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px;}
    .screen-title h2{margin:0;font-size:clamp(1.4rem,3vw,2.2rem);}
    .screen-title p{margin:6px 0 0;color:var(--muted);font-weight:650;line-height:1.45;}
    .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0;}
    .tab{border:0;background:white;border-radius:999px;padding:10px 14px;font-weight:900;cursor:pointer;box-shadow:0 7px 20px rgba(40,38,70,.07);}
    .tab.active{background:var(--primary);color:white;}
    .content-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
    .card{padding:18px;}
    .summary-list{padding-left:20px;margin:9px 0 0;line-height:1.5;}
    .summary-list li{margin:7px 0;}
    .notion{display:flex;gap:10px;align-items:flex-start;background:#fbfaff;border-radius:18px;padding:12px;margin:8px 0;}
    .notion strong{display:block;margin-bottom:3px;}
    .flashcard{
      min-height:250px;border-radius:28px;background:linear-gradient(145deg,#ffffff,#f7f5ff);display:grid;place-items:center;text-align:center;padding:24px;
      box-shadow:inset 0 0 0 1px #eee8ff;cursor:pointer;position:relative;overflow:hidden;
    }
    .flashcard:before{content:"";position:absolute;inset:auto -40px -70px auto;width:170px;height:170px;border-radius:50%;background:#dffaf5;}
    .flashcard .label{color:var(--primary-strong);font-size:.85rem;font-weight:950;letter-spacing:.07em;text-transform:uppercase;margin-bottom:10px;}
    .flashcard .text{font-size:1.35rem;font-weight:900;line-height:1.25;position:relative;}
    .flashcard .hint{position:relative;margin-top:16px;color:var(--muted);font-weight:750;font-size:.9rem;}
    .flash-actions{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:12px;}
    .quiz-setup{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
    label{display:grid;gap:6px;color:var(--muted);font-weight:900;}
    select{border:0;background:white;border-radius:16px;padding:12px 14px;box-shadow:0 7px 20px rgba(40,38,70,.08);color:var(--ink);font-weight:800;}
    .question-box{background:#fff;border-radius:24px;padding:18px;box-shadow:0 12px 30px rgba(47,43,75,.08);}
    .question-head{display:flex;justify-content:space-between;gap:10px;color:var(--muted);font-weight:900;margin-bottom:10px;}
    .question-text{font-size:1.3rem;font-weight:950;line-height:1.25;margin:0 0 16px;}
    .answers{display:grid;gap:10px;}
    .answer{
      border:2px solid transparent;background:#f9f8ff;border-radius:18px;padding:13px 14px;text-align:left;cursor:pointer;font-weight:850;color:var(--ink);transition:.15s ease;
    }
    .answer:hover{border-color:#ddd5ff;transform:translateY(-1px)}
    .answer.correct{background:#e5faed;border-color:#8bd7a2;}
    .answer.wrong{background:#fff0f0;border-color:#ffaaaa;}
    .feedback{display:none;margin-top:14px;border-radius:18px;padding:13px;background:#f6f4ff;font-weight:750;line-height:1.45;}
    .feedback.show{display:block;}
    .score-card{text-align:center;padding:30px;background:linear-gradient(135deg,#f1ecff,#e5fff8);border-radius:28px;}
    .score-card strong{font-size:3rem;display:block;}
    .timeline{display:grid;gap:10px;}
    .timeline-item{display:grid;grid-template-columns:110px 1fr;gap:12px;align-items:start;background:white;border-radius:18px;padding:13px;box-shadow:0 8px 22px rgba(47,43,75,.07);}
    .date-pill{background:#f1ecff;color:#5a4ac7;border-radius:999px;padding:7px 10px;font-weight:950;text-align:center;}
    .method-card{cursor:default;min-height:unset;}
    .method-card h3{margin:0 0 8px;}
    .method-card ul{margin:0;padding-left:18px;line-height:1.45;color:#4b5563;font-weight:650;}
    .empty{background:white;border-radius:24px;padding:22px;text-align:center;color:var(--muted);font-weight:750;}
    footer{color:var(--muted);font-size:.88rem;font-weight:650;margin-top:14px;text-align:center;}
    .hidden{display:none!important}

    .theme-assistant{background:#dff4ff}
    .assistant-shell{display:grid;grid-template-columns:minmax(0,1fr) 260px;gap:14px;align-items:start;}
    .assistant-panel{background:white;border-radius:24px;padding:16px;box-shadow:0 12px 30px rgba(47,43,75,.08);}
    .assistant-messages{min-height:360px;max-height:560px;overflow:auto;display:grid;gap:12px;padding:6px;scroll-behavior:smooth;}
    .msg{display:flex;gap:10px;align-items:flex-start;}
    .msg.user{justify-content:flex-end;}
    .bubble{max-width:88%;border-radius:22px;padding:13px 15px;line-height:1.45;font-weight:650;box-shadow:0 7px 20px rgba(40,38,70,.07);}
    .msg.user .bubble{background:#f1ecff;color:#3d337e;border-bottom-right-radius:8px;}
    .msg.bot .bubble{background:#fbfcff;color:var(--ink);border:1px solid #edf0ff;border-bottom-left-radius:8px;}
    .bubble h3{margin:0 0 8px;font-size:1.02rem;}
    .bubble p{margin:7px 0;}
    .bubble ul{margin:8px 0 0;padding-left:20px;}
    .bubble li{margin:5px 0;}
    .assistant-input{display:grid;grid-template-columns:1fr auto;gap:10px;margin-top:12px;}
    .assistant-input input{width:100%;border:0;background:#f7f5ff;border-radius:18px;padding:14px 16px;color:var(--ink);font-weight:750;box-shadow:inset 0 0 0 1px #ebe7ff;}
    .assistant-input input:focus{outline:3px solid #ded6ff;background:white;}
    .quick-help{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0 0;}
    .quick-help button,.assistant-action{border:0;background:#f7f5ff;color:#5a4ac7;border-radius:999px;padding:8px 11px;font-size:.86rem;font-weight:900;cursor:pointer;transition:.15s ease;}
    .quick-help button:hover,.assistant-action:hover{transform:translateY(-1px);background:#eee9ff;}
    .assistant-side{display:grid;gap:12px;}
    .assistant-side .card{padding:14px;}
    .assistant-side h3{font-size:1rem;margin:0 0 8px;}
    .assistant-side p{margin:0;color:var(--muted);font-weight:650;line-height:1.4;font-size:.93rem;}
    .assistant-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
    .assistant-sources{margin-top:9px;color:var(--muted);font-size:.86rem;font-weight:750;}
    @media (max-width:900px){
      .layout{grid-template-columns:1fr}.sidebar{position:static}.hero{grid-template-columns:1fr}.grid,.content-grid,.assistant-shell{grid-template-columns:1fr}.app{padding:14px}.screen{padding:14px}.quiz-setup{grid-template-columns:1fr}.timeline-item{grid-template-columns:1fr}.top-actions{justify-content:flex-start}header{align-items:flex-start;flex-direction:column}.quick-stats{grid-template-columns:repeat(3,1fr)}
    }
    @media (max-width:520px){.quick-stats{grid-template-columns:1fr}.btn{width:100%;justify-content:center}.toolbar .tab{flex:1}.screen-title{flex-direction:column}.logo{width:50px;height:50px}.chapter-card{min-height:unset}}
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="brand">
        <div class="logo">HG</div>
        <div>
          <h1>Révisions Brevet</h1>
          <p class="subtitle">Histoire • Géographie • EMC</p>
        </div>
      </div>
      <div class="top-actions">
        <button class="btn primary" id="homeBtn">Accueil</button>
        <button class="btn danger" id="resetBtn">Réinitialiser</button>
      </div>
    </header>

    <main class="layout">
      <aside class="sidebar">
        <div class="progress-box">
          <strong>Progression générale</strong>
          <div class="progress-line"><div class="progress-fill" id="globalProgress"></div></div>
          <div class="stat-row"><span id="doneCount">0 chapitre</span><span id="avgScore">0%</span></div>
        </div>
        <div class="nav-title">Menu</div>
        <nav class="nav" id="sideNav"></nav>
      </aside>

      <section class="screen" id="screen"></section>
    </main>
    <footer>Application autonome : les résultats sont enregistrés uniquement dans ce navigateur.</footer>
  </div>

  <script>
  // ===============================
  // ZONE FACILE À MODIFIER
  // Tu peux ajouter/modifier des chapitres, flashcards et questions ici.
  // ===============================
  const APP_DATA = {
    categories: [
      { id:'home', label:'Accueil', icon:'🏠' },
      { id:'history', label:'Histoire', icon:'📜' },
      { id:'geo', label:'Géographie', icon:'🗺️' },
      { id:'emc', label:'EMC', icon:'⚖️' },
      { id:'methods', label:'Méthodes brevet', icon:'🧠' },
      { id:'markers', label:'Repères', icon:'📍' },
      { id:'assistant', label:'Assistant révision', icon:'💬' }
    ],
    chapters: [
      {
        id:'h1', theme:'history', icon:'🌍', title:'Civils et militaires dans la Première Guerre mondiale',
        intro:'Comprendre une guerre totale qui mobilise les soldats, les civils, l’économie et les sociétés européennes.',
        keywords:['guerre totale','tranchées','violence de masse','génocide arménien'],
        summary:[
          'La Première Guerre mondiale oppose les grandes puissances européennes et devient une guerre mondiale.',
          'Les soldats vivent une violence extrême dans les tranchées : bombardements, gaz, assauts, peur permanente.',
          'Les civils sont mobilisés dans l’économie de guerre et subissent pénuries, propagande et bombardements.',
          'Le génocide des Arméniens montre que la guerre touche aussi les populations civiles par des violences de masse.',
          'Le conflit bouleverse l’Europe : millions de morts, sociétés traumatisées, nouveaux États et tensions durables.'
        ],
        cards:[
          ['Guerre totale','Guerre qui mobilise toute la société : soldats, civils, économie, science, propagande et État.'],
          ['Tranchées','Fossés creusés où les soldats vivent et combattent sur le front, notamment sur le front de l’Ouest.'],
          ['Violence de masse','Violence extrême touchant un très grand nombre de personnes, militaires ou civiles.'],
          ['Génocide arménien','Extermination organisée des Arméniens par l’Empire ottoman à partir de 1915.'],
          ['Verdun','Bataille de 1916 devenue un symbole de la violence des combats.'],
          ['Arrière','Espace éloigné du front où les civils participent à l’effort de guerre.']
        ],
        quizA:[
          ['Que signifie “guerre totale” ?','Une guerre qui mobilise toute la société',['Une guerre courte','Une guerre sans civils','Une guerre seulement navale'],'La guerre totale mobilise les soldats, les civils, l’économie, la propagande et l’État.','Parfait, tu as compris l’idée centrale du chapitre !'],
          ['Où les soldats combattent-ils principalement sur le front de l’Ouest ?','Dans les tranchées',['Dans les palais','Dans les usines','Dans les colonies uniquement'],'Les tranchées deviennent le symbole de la guerre de position.','Bien joué, c’est un repère essentiel.'],
          ['Quelle bataille de 1916 symbolise la violence de masse ?','Verdun',['Waterloo','Stalingrad','Austerlitz'],'Verdun est une bataille très meurtrière de la Première Guerre mondiale.','Très bon réflexe chronologique.'],
          ['Quel groupe est victime d’un génocide dans l’Empire ottoman ?','Les Arméniens',['Les Belges','Les Italiens','Les Espagnols'],'Le génocide arménien commence en 1915.','Exact, c’est une notion importante.'],
          ['Quel rôle jouent les civils à l’arrière ?','Ils participent à l’effort de guerre',['Ils ne sont pas concernés','Ils quittent tous l’Europe','Ils combattent tous au front'],'Les civils produisent, financent, subissent la propagande et les pénuries.','Oui, tu vois bien que la guerre dépasse le front.'],
          ['Quelle expression désigne la mobilisation économique pour la guerre ?','L’économie de guerre',['La mondialisation','Le libre-échange','La décolonisation'],'Les usines et les ressources sont orientées vers les besoins militaires.','Très bien.'],
          ['Quelle période correspond à la Première Guerre mondiale ?','1914-1918',['1939-1945','1789-1799','1947-1991'],'La guerre commence en 1914 et se termine par l’armistice de 1918.','Super, repère maîtrisé.'],
          ['Pourquoi parle-t-on de sociétés traumatisées après 1918 ?','À cause des millions de morts et des destructions',['À cause de la prospérité générale','À cause de la paix immédiate partout','À cause de l’absence de pertes'],'Le bilan humain et matériel est immense.','Très bonne réponse.']
        ],
        quizB:[
          ['Dans un développement construit, quelle problématique convient le mieux ?','Comment la Première Guerre mondiale transforme-t-elle les sociétés ?',['Quel est le meilleur pays européen ?','Pourquoi la guerre est-elle amusante ?','Combien coûte une arme ?'],'Une bonne problématique porte sur les transformations et la mobilisation.','Très bon choix de méthode.'],
          ['Dans un document de propagande, quel élément faut-il identifier ?','Le message que l’auteur veut faire passer',['La couleur préférée du soldat','Le prix du papier','La météo du jour'],'La propagande cherche à influencer l’opinion.','Excellent réflexe d’analyse de document.'],
          ['Quelle idée peut servir d’argument dans une rédaction ?','Les civils sont mobilisés à l’arrière',['Les civils ne travaillent jamais','La guerre ne touche pas l’économie','Les combats sont uniquement sportifs'],'C’est un argument clair pour montrer la guerre totale.','Bien joué, c’est utilisable dans une copie.'],
          ['Quel exemple précis peut illustrer la violence de masse ?','La bataille de Verdun',['La construction européenne','La chute du mur de Berlin','Le traité de Maastricht'],'Verdun illustre l’intensité des combats et le nombre de victimes.','Très bon exemple.'],
          ['Quelle phrase est la plus adaptée à une conclusion ?','La Première Guerre mondiale bouleverse durablement l’Europe.',['Voilà c’est fini.','Je n’ai pas aimé ce chapitre.','Les tranchées sont anciennes.'],'Une conclusion doit répondre clairement au sujet.','Oui, conclusion propre et efficace.']
        ]
      },
      {
        id:'h2', theme:'history', icon:'⚡', title:'Démocraties fragilisées et totalitarismes dans l’entre-deux-guerres',
        intro:'Comprendre comment les crises favorisent la montée des régimes totalitaires et fragilisent les démocraties.',
        keywords:['totalitarisme','URSS stalinienne','Allemagne nazie','Front populaire'],
        summary:[
          'Après 1918, l’Europe est affaiblie par les crises économiques, sociales et politiques.',
          'En URSS, Staline met en place un régime totalitaire fondé sur le parti unique, la terreur et la collectivisation.',
          'En Allemagne, Hitler arrive au pouvoir en 1933 et impose le nazisme, raciste, antisémite et dictatorial.',
          'Les régimes totalitaires contrôlent la population par la propagande, la répression et l’encadrement de la jeunesse.',
          'En France, la démocratie résiste mais connaît des tensions, notamment dans les années 1930.'
        ],
        cards:[
          ['Régime totalitaire','Dictature qui cherche à contrôler totalement la société et les individus.'],
          ['Propagande','Moyens utilisés pour influencer l’opinion et imposer les idées du régime.'],
          ['Staline','Dirigeant de l’URSS qui met en place une dictature totalitaire.'],
          ['Hitler','Chef du parti nazi, chancelier allemand en 1933, puis dictateur.'],
          ['Antisémitisme','Hostilité et haine envers les Juifs.'],
          ['Front populaire','Gouvernement français de gauche arrivé au pouvoir en 1936.']
        ],
        quizA:[
          ['Qu’est-ce qu’un régime totalitaire ?','Une dictature qui contrôle toute la société',['Une démocratie directe','Un régime sans État','Une monarchie parlementaire'],'Le totalitarisme veut contrôler les opinions, les comportements et la vie sociale.','Exact, notion fondamentale.'],
          ['Quel dirigeant impose un régime totalitaire en URSS ?','Staline',['Churchill','De Gaulle','Kennedy'],'Staline dirige l’URSS et impose terreur, propagande et parti unique.','Bien joué.'],
          ['En quelle année Hitler arrive-t-il au pouvoir ?','1933',['1918','1945','1989'],'Hitler est nommé chancelier en Allemagne en 1933.','Repère validé.'],

  function init(){
    $('#homeBtn').addEventListener('click',()=>goHome());

  function renderNav(){
    const nav = $('#sideNav');
    nav.innerHTML = APP_DATA.categories.map(cat => {
      const count = cat.id==='home' || cat.id==='methods' || cat.id==='markers' || cat.id==='assistant' ? '' : `<span class="badge">${APP_DATA.chapters.filter(c=>c.theme===cat.id).length}</span>`;
      return `<button data-nav="${cat.id}"><span>${cat.icon} ${cat.label}</span>${count}</button>`;
    }).join('');
    nav.querySelectorAll('button').forEach(btn => btn.addEventListener('click',()=>navigate(btn.dataset.nav)));
  }

  function setActiveNav(id){
    document.querySelectorAll('[data-nav]').forEach(b=>b.classList.toggle('active', b.dataset.nav===id));
  }

  function navigate(id){
    state.view=id; state.activeTheme=id; state.activeChapter=null; state.quiz=null; state.tab='summary';
    setActiveNav(id);
    if(id==='home') renderHome();
    else if(id==='methods') renderMethods();
    else if(id==='markers') renderMarkers();
    else if(id==='assistant') renderAssistant();
    else renderChapterList(id);
  }

  function goHome(){state.view='home'; setActiveNav('home'); renderHome();}

  function updateProgressUI(){
    const chapters = APP_DATA.chapters;
    const done = chapters.filter(c => state.progress[c.id]?.completed).length;
    const scores = chapters.map(c => state.progress[c.id]?.best || 0).filter(Boolean);
    const avg = scores.length ? Math.round(scores.reduce((a,b)=>a+b,0)/scores.length) : 0;
    $('#doneCount').textContent = done + (done>1?' chapitres':' chapitre');
    $('#avgScore').textContent = avg + '%';
    $('#globalProgress').style.width = Math.round(done/chapters.length*100) + '%';
  }

  function resetProgress(){
    const ok = confirm('Réinitialiser toute la progression de cette application ?');
    if(!ok) return;
    state.progress = {};
    localStorage.removeItem(STORAGE_KEY);
    updateProgressUI();
    renderCurrent();
  }

    if(state.activeChapter) renderChapter(state.activeChapter.id, state.tab);

    else if(state.view==='assistant') renderAssistant();

    $('#chapterContent').innerHTML = `

    `;

  function normalizeQuestion(q){
    return {question:q[0], correct:q[1], wrongs:q[2], explanation:q[3], encouragement:q[4]};
  }

  function buildQuiz(ch, serie, count){
    const base = (serie==='A' ? ch.quizA : ch.quizB).map(normalizeQuestion);
    const generic = (APP_DATA.genericQuestions[serie] || []).map(normalizeQuestion);
    let pool = shuffle([...base, ...generic]);
    while(pool.length < count){ pool = pool.concat(shuffle([...base, ...generic])); }
    return pool.slice(0,count).map(q => ({...q, answers: shuffle([q.correct, ...q.wrongs])}));
  }

  function startQuiz(){
    const serie = $('#serie').value;
    const count = Number($('#count').value);
    state.quiz = { questions: buildQuiz(state.activeChapter, serie, count), current:0, score:0, locked:false, selected:null, serie, count };
    renderQuizQuestion();
  }

  function renderQuizQuestion(){
    const qz = state.quiz;
    if(qz.current >= qz.questions.length) return renderQuizEnd();
    const q = qz.questions[qz.current];
    $('#quizArea').innerHTML = `
      <div class="question-box">
        <div class="question-head"><span>Question ${qz.current+1} / ${qz.questions.length}</span><span>Score : ${qz.score}</span></div>
        <p class="question-text">${escapeHtml(q.question)}</p>
        <div class="answers">
          ${q.answers.map(a=>`<button class="answer" onclick="answerQuestion(this, '${encodeURIComponent(a)}')">${escapeHtml(a)}</button>`).join('')}
        </div>
        <div class="feedback" id="feedback"></div>
      </div>
    `;
    $('#quizArea').scrollIntoView({behavior:'smooth', block:'start'});
  }

  function answerQuestion(btn, encoded){
    const qz = state.quiz;
    if(qz.locked) return;
    qz.locked = true;
    const selected = decodeURIComponent(encoded);
    const q = qz.questions[qz.current];
    const good = selected === q.correct;
    if(good) qz.score++;
    document.querySelectorAll('.answer').forEach(b=>{
      const val = b.textContent;
      if(val === q.correct) b.classList.add('correct');
      else if(b === btn) b.classList.add('wrong');
    });
    const feedback = $('#feedback');
    feedback.classList.add('show');
    feedback.innerHTML = `<strong>${good ? q.encouragement : 'Pas grave, tu progresses à chaque erreur.'}</strong><br>${escapeHtml(q.explanation)}<br><br><button class="btn primary small" onclick="nextQuestion()">Question suivante</button>`;
  }

  function nextQuestion(){state.quiz.current++; state.quiz.locked=false; renderQuizQuestion();}

  function renderQuizEnd(){
    const qz = state.quiz;
    const pct = Math.round((qz.score/qz.questions.length)*100);
    const ch = state.activeChapter;
    const p = state.progress[ch.id] || {};
    p.best = Math.max(p.best || 0, pct);
    if(pct >= 70) p.completed = true;
    state.progress[ch.id]=p; saveProgress();
    let msg = pct >= 85 ? 'Excellent, tu peux viser très haut sur ce chapitre.' : pct >= 70 ? 'Chapitre validé, continue comme ça.' : pct >= 50 ? 'C’est encourageant, relis les notions puis retente.' : 'Reprends les flashcards puis refais une série de 5 questions.';
    $('#quizArea').innerHTML = `
      <div class="score-card">
        <strong>${pct}%</strong>
        <h3>${qz.score} bonne${qz.score>1?'s':''} réponse${qz.score>1?'s':''} sur ${qz.questions.length}</h3>

        </div>
      </div>
    `;
  }

  const ASSISTANT_STOPWORDS = new Set('alors apres avec avoir cette dans des du elle elles est et faire faut ils les leur mais mes mon nous pas plus pour que qui quoi sans ses son sur tout très tres une vos vous aux au de d l la le un en y a me ce ca ça c comment pourquoi peux peut peux-tu peux tu svp stp'.split(' '));

  function normalizeText(str){
    return String(str || '')
      .toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
      .replace(/[’']/g,' ')
      .replace(/[^a-z0-9]+/g,' ')
      .replace(/\s+/g,' ')
      .trim();
  }

  function assistantTokens(text){
    return normalizeText(text).split(' ').filter(t => t.length > 2 && !ASSISTANT_STOPWORDS.has(t));
  }

  function buildAssistantIndex(){
    const entries = [];
    ASSISTANT_EXTRA.forEach((item, idx) => {
      entries.push({
        id:'extra-'+idx,
        type:'extra',
        title:item.title,
        keywords:item.keywords || [],
        answer:item.answer || [],
        bullets:item.bullets || [],
        chapterId:item.chapterId || null,
        action:item.action || null,
        searchText:[item.title, ...(item.keywords||[]), ...(item.answer||[]), ...(item.bullets||[])].join(' ')
      });
    });

    APP_DATA.chapters.forEach(ch => {
      entries.push({
        id:'chapter-'+ch.id,
        type:'chapter',
        title:'Chapitre : '+ch.title,
        keywords:[ch.title, ...ch.keywords, ...ch.cards.map(c=>c[0])],
        answer:[ch.intro],
        bullets:ch.summary,
        chapterId:ch.id,
        searchText:[ch.title, ch.intro, ...ch.keywords, ...ch.summary, ...ch.cards.flat()].join(' ')
      });
      ch.cards.forEach((card, i) => {
        entries.push({
          id:'card-'+ch.id+'-'+i,
          type:'definition',
          title:'Définition : '+card[0],
          keywords:[card[0], ch.title, ...ch.keywords],
          answer:[card[1]],
          bullets:[],
          chapterId:ch.id,
          searchText:[card[0], card[1], ch.title, ...ch.keywords].join(' ')
        });
      });
    });

    APP_DATA.methods.forEach((m, i) => {
      entries.push({
        id:'method-'+i,
        type:'method',
        title:'Méthode : '+m.title,
        keywords:[m.title, ...m.steps],
        answer:['Voici la méthode à appliquer :'],
        bullets:m.steps,
        action:{type:'nav', target:'methods', label:'Ouvrir les méthodes'},
        searchText:[m.title, ...m.steps].join(' ')
      });
    });

    APP_DATA.markers.forEach((mk, i) => {
      entries.push({
        id:'marker-'+i,
        type:'marker',
        title:'Repère : '+mk[0],
        keywords:[mk[0], mk[1], 'date', 'repere', 'chronologie'],
        answer:[mk[0]+' : '+mk[1]+'.'],
        bullets:['À apprendre dans les deux sens : date → événement et événement → date.'],
        action:{type:'nav', target:'markers', label:'Voir tous les repères'},
        searchText:[mk[0], mk[1], 'date repere chronologie'].join(' ')
      });
    });
    return entries;
  }

  function scoreAssistantEntry(entry, queryNorm, tokens){
    const titleNorm = normalizeText(entry.title);
    const hay = normalizeText(entry.searchText || '');
    let score = 0;
    if(!tokens.length) return 0;
    if(titleNorm && queryNorm.includes(titleNorm.replace(/^(definition|chapitre|methode|repere) /,''))) score += 15;
    (entry.keywords || []).forEach(k => {
      const nk = normalizeText(k);
      if(!nk) return;
      if(queryNorm === nk) score += 18;
      else if(queryNorm.includes(nk) || nk.includes(queryNorm)) score += Math.min(12, 3 + nk.split(' ').length * 2);
    });
    tokens.forEach(t => {
      if(titleNorm.includes(t)) score += 4;
      if(hay.includes(t)) score += 1.4;
      (entry.keywords || []).forEach(k => { if(normalizeText(k).includes(t)) score += 1.2; });
    });
    return score;
  }

  function getAssistantAnswer(query){
    const queryNorm = normalizeText(query);
    const tokens = assistantTokens(query);
    if(!queryNorm || tokens.length === 0){
      return {
        title:'Je peux t’aider à réviser',
        answer:['Écris une notion, une date, un chapitre ou une méthode. Exemple : Guerre froide, développement construit, croquis, laïcité, aire urbaine, Shoah, Vichy, UE.'],
        bullets:['Tu peux aussi cliquer sur les aides rapides sous la zone de saisie.']
      };
    }

    if(queryNorm.includes('toutes les dates') || queryNorm.includes('liste dates') || queryNorm.includes('repere') || queryNorm.includes('reperes')){
      return {
        title:'Repères essentiels à connaître',
        answer:['Voici les grands repères intégrés dans l’application :'],
        bullets:APP_DATA.markers.map(m => m[0]+' — '+m[1]),
        action:{type:'nav', target:'markers', label:'Ouvrir la frise des repères'}
      };
    }

    if(queryNorm.includes('chapitres') || queryNorm.includes('programme')){
      return {
        title:'Chapitres disponibles dans l’application',
        answer:['L’application est organisée en histoire, géographie, EMC, méthodes et repères.'],
        bullets:APP_DATA.chapters.map(ch => ch.title),
        action:{type:'nav', target:'home', label:'Retour à l’accueil'}
      };
    }

    const entries = buildAssistantIndex()
      .map(e => ({...e, score:scoreAssistantEntry(e, queryNorm, tokens)}))
      .filter(e => e.score > 0)
      .sort((a,b)=>b.score-a.score);

    if(!entries.length || entries[0].score < 3){
      return {
        title:'Je n’ai pas trouvé de réponse précise',
        answer:['Essaie avec un mot-clé plus court ou plus proche du cours.'],
        bullets:['Exemples : guerre froide, aire urbaine, Vichy, Shoah, laïcité, croquis, développement construit, repères.', 'Tu peux aussi ouvrir un chapitre et utiliser ses flashcards.'],
        action:{type:'nav', target:'home', label:'Voir le menu'}
      };
    }

    const best = entries[0];
    const related = entries.slice(1,4).filter(e => e.score >= Math.max(3, best.score * 0.45));
    const answer = {
      title:best.title,
      answer:best.answer,
      bullets:best.bullets,
      chapterId:best.chapterId,
      action:best.action,
      related:related.map(e => ({title:e.title, chapterId:e.chapterId, action:e.action}))
    };
    return answer;
  }

  function renderAssistantAnswer(ans){
    const paras = (ans.answer || []).map(p => `<p>${escapeHtml(p)}</p>`).join('');
    const bullets = (ans.bullets || []).length ? `<ul>${ans.bullets.map(b=>`<li>${escapeHtml(b)}</li>`).join('')}</ul>` : '';
    const actions = [];
    if(ans.chapterId){
      actions.push(`<button class="assistant-action" data-open-chapter="${escapeHtml(ans.chapterId)}">Ouvrir le chapitre</button>`);
    }
    if(ans.action?.type === 'nav'){
      actions.push(`<button class="assistant-action" data-assistant-nav="${escapeHtml(ans.action.target)}">${escapeHtml(ans.action.label || 'Ouvrir')}</button>`);
    }
    const related = (ans.related || []).length ? `<div class="assistant-sources"><strong>À revoir aussi :</strong> ${ans.related.map(r => escapeHtml(r.title)).join(' • ')}</div>` : '';
    return `<h3>${escapeHtml(ans.title)}</h3>${paras}${bullets}${actions.length ? `<div class="assistant-actions">${actions.join('')}</div>` : ''}${related}`;
  }

  function renderAssistant(){
    setActiveNav('assistant');
    state.view = 'assistant';
    if(!state.assistantHistory.length){
      state.assistantHistory.push({role:'bot', html:renderAssistantAnswer(getAssistantAnswer('aide'))});
    }
    screen.innerHTML = `
      <div class="screen-title">
        <div><h2>💬 Assistant révision local</h2><p>Pose une question simple sur le brevet. L’assistant cherche dans les chapitres, définitions, méthodes et repères de l’application.</p></div>
        <button class="btn small" onclick="clearAssistant()">Effacer le chat</button>
      </div>
      <div class="assistant-shell">
        <section class="assistant-panel">
          <div class="assistant-messages" id="assistantMessages"></div>
          <div class="assistant-input">
            <input id="assistantInput" type="text" placeholder="Ex : Explique-moi la Guerre froide" autocomplete="off" />
            <button class="btn primary" onclick="sendAssistant()">Envoyer</button>
          </div>
          <div class="quick-help">
            <button data-quick="développement construit">Développement construit</button>
            <button data-quick="repères chronologiques">Repères</button>
            <button data-quick="guerre froide">Guerre froide</button>
            <button data-quick="aire urbaine">Aire urbaine</button>
            <button data-quick="laïcité">Laïcité</button>
            <button data-quick="croquis de géographie">Croquis</button>
            <button data-quick="Shoah">Shoah</button>
            <button data-quick="Vichy collaboration résistance">Vichy/Résistance</button>
            <button data-quick="Union européenne">Union européenne</button>
            <button data-quick="aménager le territoire">Aménagement</button>
          </div>
        </section>
        <aside class="assistant-side">
          <article class="card"><h3>Ce que l’assistant sait faire</h3><p>Définitions, dates, méthodes, conseils de rédaction, repères, notions d’histoire, géographie et EMC.</p></article>
          <article class="card"><h3>Important</h3><p>Ce chat est local : pas d’API, pas de compte, pas de tokens. Il ne génère pas librement : il retrouve les réponses préparées dans l’application.</p></article>
          <article class="card"><h3>Astuce</h3><p>Écris des mots-clés courts. Exemple : “guerre totale” marche mieux que “j’ai pas compris le truc avec les soldats”.</p></article>
        </aside>
      </div>
    `;
    renderAssistantMessages();
    const input = $('#assistantInput');
    input.addEventListener('keydown', e => { if(e.key === 'Enter') sendAssistant(); });
    document.querySelectorAll('[data-quick]').forEach(b => b.addEventListener('click', () => assistantQuick(b.dataset.quick)));
  }

  function renderAssistantMessages(){
    const box = $('#assistantMessages');
    if(!box) return;
    box.innerHTML = state.assistantHistory.map(m => {
      if(m.role === 'user') return `<div class="msg user"><div class="bubble">${escapeHtml(m.text)}</div></div>`;
      return `<div class="msg bot"><div class="bubble">${m.html}</div></div>`;
    }).join('');
    box.querySelectorAll('[data-open-chapter]').forEach(b => b.addEventListener('click', () => openChapter(b.dataset.openChapter)));
    box.querySelectorAll('[data-assistant-nav]').forEach(b => b.addEventListener('click', () => navigate(b.dataset.assistantNav)));
    box.scrollTop = box.scrollHeight;
  }

  function sendAssistant(){
    const input = $('#assistantInput');
    if(!input) return;
    const text = input.value.trim();
    if(!text) return;
    state.assistantHistory.push({role:'user', text});
    const answer = getAssistantAnswer(text);
    state.assistantHistory.push({role:'bot', html:renderAssistantAnswer(answer)});
    input.value = '';
    renderAssistantMessages();
  }

  function assistantQuick(text){
    const input = $('#assistantInput');
    if(input) input.value = text;
    sendAssistant();
  }

  function clearAssistant(){
    state.assistantHistory = [];
    renderAssistant();
  }

  window.navigate = navigate;
  window.openChapter = openChapter;
  window.renderChapter = renderChapter;
  window.flipCard = flipCard;
  window.nextCard = nextCard;
  window.prevCard = prevCard;
  window.startQuiz = startQuiz;
  window.answerQuestion = answerQuestion;
  window.nextQuestion = nextQuestion;
  window.sendAssistant = sendAssistant;
  window.assistantQuick = assistantQuick;
  window.clearAssistant = clearAssistant;

  init();
  </script>
